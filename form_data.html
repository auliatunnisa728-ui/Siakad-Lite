<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Saya - Siakad Lite</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html">🎓 Siakad Lite</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="matakuliah.html">Mata Kuliah</a></li>
          <li class="nav-item"><a class="nav-link active" href="form-data.html">Data Saya</a></li>
        </ul>
        <a href="index.html" class="btn btn-outline-light btn-sm">Keluar</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <div class="row justify-content-center">
      <div class="col-md-7">

        <div class="card">
          <div class="card-header">
            <strong>📝 Form Pembaruan Data Mahasiswa</strong>
          </div>
          <div class="card-body">

            <div id="pesanSukses" class="alert alert-success d-none">
              ✅ Data berhasil disimpan!
            </div>

            <form id="formData">

              <div class="mb-3">
                <label for="inputNama" class="form-label">Nama Lengkap <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="inputNama" placeholder="Nama sesuai KTP">
                <div class="invalid-feedback">Nama tidak boleh kosong.</div>
              </div>

              <div class="mb-3">
                <label for="inputEmail" class="form-label">Email Aktif <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="inputEmail" placeholder="nama@email.com">
                <div class="invalid-feedback">Masukkan email yang valid.</div>
              </div>

              <div class="mb-3">
                <label for="inputHp" class="form-label">No. HP</label>
                <input type="tel" class="form-control" id="inputHp" placeholder="08xxxxxxxxxx">
              </div>

              <div class="mb-3">
                <label for="inputJurusan" class="form-label">Jurusan <span class="text-danger">*</span></label>
                <select class="form-select" id="inputJurusan">
                  <option value="">-- Pilih Jurusan --</option>
                  <option value="PTI">Pendidikan Teknologi Informasi</option>
                  <option value="SI">Sistem Informasi</option>
                  <option value="TK">Teknik Komputer</option>
                </select>
                <div class="invalid-feedback">Jurusan wajib dipilih.</div>
              </div>

              <div class="mb-3">
                <label for="inputAlamat" class="form-label">Alamat</label>
                <textarea class="form-control" id="inputAlamat" rows="3" placeholder="Alamat lengkap"></textarea>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Simpan Data</button>
                <button type="reset" class="btn btn-outline-secondary">Reset</button>
              </div>

            </form>

          </div>
        </div>

        <div id="pratinjauData" class="card mt-3 d-none">
          <div class="card-header">📋 Data Tersimpan</div>
          <div class="card-body" id="isiPratinjau">
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
