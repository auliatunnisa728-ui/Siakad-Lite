<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Siakad Lite</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">

      <a class="navbar-brand" href="dashboard.html">
        🎓 Siakad Lite
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#menuNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="menuNavbar">
        <ul class="navbar-nav me-auto">

          <li class="nav-item">
            <a class="nav-link active" href="dashboard.html">Dashboard</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="matakuliah.html">Mata Kuliah</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="form-data.html">Data Saya</a>
          </li>

        </ul>

        <a href="index.html" class="btn btn-outline-light btn-sm">
          Keluar
        </a>

      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <h4 class="mb-1">Selamat Datang, <span id="namaHalaman">Mahasiswa</span>!</h4>
    <p class="text-muted mb-4">Berikut ringkasan akademik semester ini.</p>

    <div class="row g-3 mb-4">

      <div class="col-md-4">
        <div class="card text-white bg-primary">
          <div class="card-body">
            <h6 class="card-subtitle mb-1">Total SKS Diambil</h6>
            <h2 class="card-title counter" id="data-target" data-target="22">0</h2>
            <p class="card-text">dari 24 SKS maksimal</p>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card text-white bg-success">
          <div class="card-body">
            <h6 class="card-subtitle mb-1">IPK Sementara</h6>
            <h2 class="card-title counter" id="data-target" data-target="3.95">0</h2>
            <p class="card-text">Skala 4.00</p>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card text-white bg-warning">
          <div class="card-body">
            <h6 class="card-subtitle mb-1">Kehadiran</h6>
            <h2 class="card-title counter" id="data-target" data-target="80">0%</h2>
            <p class="card-text">dari total pertemuan</p>
          </div>
        </div>
      </div>

    </div>

    <div class="card">
      <div class="card-header">
        <strong>📅 Jadwal Hari Ini</strong>
      </div>
      <div class="card-body p-0">

        <div class="table-responsive">

          <table class="table table-hover mb-0">

            <thead class="table-light">
              <tr>
                <th>No</th>
                <th>Mata Kuliah</th>
                <th>Waktu</th>
                <th>Ruang</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody id="isiTabel">
            </tbody>

          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
