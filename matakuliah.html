<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mata Kuliah - Siakad Lite</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html">🎓 Siakad Lite</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link active" href="matakuliah.html">Mata Kuliah</a></li>
          <li class="nav-item"><a class="nav-link" href="form-data.html">Data Saya</a></li>
        </ul>
        <a href="index.html" class="btn btn-outline-light btn-sm">Keluar</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">

    <h4 class="mb-1">Daftar Mata Kuliah</h4>
    <p class="text-muted mb-4">Semester Ganjil 2025/2026</p>

    <div class="mb-3">
      <input 
        type="text" 
        id="cariMatkul" 
        class="form-control" 
        placeholder="Cari mata kuliah...">
    </div>

    <div class="mb-3" id="grupFilter">
      <button class="btn btn-primary btn-sm me-2" data-filter="semua">Semua</button>
      <button class="btn btn-outline-success btn-sm me-2" data-filter="lulus">Lulus</button>
      <button class="btn btn-outline-warning btn-sm" data-filter="proses">Sedang Diambil</button>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-hover">
        <thead class="table-primary">
          <tr>
            <th>Kode MK</th>
            <th>Nama Mata Kuliah</th>
            <th>SKS</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelMatkul">
        </tbody>
      </table>
    </div>

  </div>

  <div class="modal fade" id="modalDetail" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="judulModal">Detail Mata Kuliah</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="isiModal">
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
